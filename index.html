<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SURVIVAL VOXEL</title>
    <meta
      name="description"
      content="ブラウザで遊べるサバイバルボクセルゲーム"
    />
  </head>
  <body>
    <!-- ゲーム描画キャンバス -->
    <canvas id="game-canvas"></canvas>

    <!-- クロスヘア -->
    <div id="crosshair"></div>

    <!-- ホットバー -->
    <div id="toolbar"></div>

    <!-- タイトル画面 -->
    <div id="title-screen">
      <div class="title-content">
        <h1 class="game-title">SURVIVAL VOXEL</h1>
        <p class="subtitle">BROWSER SANDBOX</p>

        <div class="world-selection">
          <h3>WORLD SELECT</h3>
          <ul id="world-list">
            <!-- JavaScriptで動的に追加 -->
            <li class="empty-world-msg">No worlds found.</li>
          </ul>
        </div>

        <div class="title-actions">
          <input
            type="text"
            id="new-world-name"
            placeholder="New World Name"
            maxlength="20"
          />
          <button id="btn-create-world" class="btn-primary">
            🌍 新規ワールド作成
          </button>
        </div>
      </div>
    </div>

    <!-- ポーズ画面 -->
    <div id="blocker" style="display: none">
      <div id="instructions">
        <h1 class="game-title">SURVIVAL VOXEL</h1>
        <p class="subtitle">BROWSER SANDBOX</p>
        <div class="controls-grid">
          <div class="control-item">
            <span>移動</span>
            <div class="key-group">
              <span class="key">W</span><span class="key">A</span
              ><span class="key">S</span><span class="key">D</span>
            </div>
          </div>
          <div class="control-item">
            <span>ジャンプ</span>
            <div class="key-group"><span class="key">SPACE</span></div>
          </div>
          <div class="control-item">
            <span>走る</span>
            <div class="key-group"><span class="key">SHIFT</span></div>
          </div>
          <div class="control-item">
            <span>破壊</span>
            <div class="key-group"><span class="key">左クリック</span></div>
          </div>
          <div class="control-item">
            <span>設置</span>
            <div class="key-group"><span class="key">右クリック</span></div>
          </div>
          <div class="control-item">
            <span>インベントリ</span>
            <div class="key-group"><span class="key">E</span></div>
          </div>
          <div class="control-item">
            <span>スロット切替</span>
            <div class="key-group">
              <span class="key">1</span>~<span class="key">0</span>
            </div>
          </div>
          <div class="control-item">
            <span>ホイール</span>
            <div class="key-group"><span class="key">スクロール</span></div>
          </div>
        </div>
        <div class="pause-actions">
          <button
            id="btn-resume-game"
            class="btn-primary"
            style="margin-bottom: 12px; width: 100%"
          >
            ▶ ゲームに戻る
          </button>
          <button
            id="btn-open-settings"
            class="btn-secondary"
            style="margin-bottom: 12px; width: 100%"
          >
            ⚙️ 設定
          </button>
          <button
            id="btn-back-to-title"
            class="btn-danger"
            style="margin-bottom: 12px; width: 100%"
          >
            🏠 セーブしてタイトルへ戻る
          </button>
        </div>
      </div>
    </div>

    <!-- 設定画面 -->
    <div id="settings-ui">
      <div class="settings-header">
        <h2>SETTINGS</h2>
        <span class="close-hint">[ESC] で戻る</span>
      </div>
      <div class="settings-body">
        <div class="setting-item">
          <label>マスター音量: <span id="val-volume">30</span>%</label>
          <input type="range" id="slider-volume" min="0" max="100" value="30" />
        </div>
        <div class="setting-item">
          <label>マウス感度: <span id="val-sensitivity">20</span></label>
          <input
            type="range"
            id="slider-sensitivity"
            min="1"
            max="100"
            value="20"
          />
        </div>
        <div class="setting-item">
          <label>視野角 (FOV): <span id="val-fov">75</span></label>
          <input type="range" id="slider-fov" min="60" max="110" value="75" />
        </div>
        <div class="setting-item">
          <label
            >描画距離: <span id="val-render-dist">18</span> チャンク
            (※再構築必要)</label
          >
          <input
            type="range"
            id="slider-render-dist"
            min="8"
            max="32"
            value="18"
            disabled
          />
        </div>

        <div class="settings-footer">
          <button id="btn-reset-settings" class="btn-danger">
            初期設定に戻す
          </button>
          <button id="btn-close-settings" class="btn-primary">
            適用して閉じる
          </button>
        </div>
      </div>
    </div>

    <!-- インベントリ / クラフト画面 -->
    <div id="inventory-ui">
      <div class="inv-header">
        <h2>INVENTORY & CRAFTING</h2>
        <span class="close-hint">[E] でとじる</span>
      </div>
      <div class="inv-body">
        <div class="inv-left">
          <div class="inv-section">
            <h3>所持アイテム</h3>
            <div class="inventory-grid"></div>
          </div>
          <div class="inv-section">
            <h3>ホットバー設定 (ドラッグ &amp; ドロップ)</h3>
            <div class="hotbar-grid"></div>
          </div>
        </div>
        <div class="inv-section">
          <h3>クラフト</h3>
          <div class="recipe-list"></div>
        </div>
      </div>
    </div>

    <!-- ESM エントリポイント -->
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
